<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie/Book Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <h1>Movie/Book Finder</h1>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Enter movie or book name">
      <button id="searchBtn">Search</button>
    </div>
    <div id="results" class="results"></div>
    <p id="errorMsg" class="error hidden">No results found. Try another search!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
